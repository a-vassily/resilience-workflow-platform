rules:
  - id: PRIV_ACCESS_CRITICAL_SERVICE
    description: Failed privileged access combined with repeated PAM failures on a critical service.
    confidence_score: 0.78
    draft_severity: high
    min_events: 2
    conditions:
      all:
        - event_type_all: [failed_privileged_access, repeated_failed_privileged_access]
        - same_linked_service: true
        - critical_service: true
        - min_distinct_sources: 2

  - id: VENDOR_OUTAGE_WITH_SYNTHETIC_FAILURE
    description: Upstream dependency outage combined with synthetic or latency degradation on a critical service.
    confidence_score: 0.86
    draft_severity: critical
    min_events: 2
    conditions:
      all:
        - event_type_all: [vendor_outage, synthetic_check_failure]
        - same_linked_service: true
        - critical_service: true
        - vendor_present: true

  - id: VENDOR_DEGRADATION_WITH_SERVICE_ERRORS
    description: Vendor degradation materially affecting the service and generating user-facing errors.
    confidence_score: 0.74
    draft_severity: high
    min_events: 2
    conditions:
      all:
        - event_type_all: [vendor_degradation, service_error_rate_high]
        - same_linked_service: true
        - critical_service: true

  - id: PLATFORM_INSTABILITY_CRITICAL_WORKLOAD
    description: Platform instability signs on a critical workload, such as restart storms plus capacity stress.
    confidence_score: 0.82
    draft_severity: high
    min_events: 2
    conditions:
      all:
        - event_type_any: [pod_restart_storm]
        - event_type_count_at_least:
            types: [cpu_saturation, memory_pressure, latency_spike]
            count: 1
        - same_linked_service: true
        - critical_service: true

  - id: BREAK_GLASS_ADMIN_ACTIVITY
    description: Break-glass or suspicious administrative activity on a service with supporting privileged context.
    confidence_score: 0.84
    draft_severity: critical
    min_events: 2
    conditions:
      all:
        - event_type_any: [break_glass_account_used, suspicious_admin_session, privileged_group_change]
        - tag_any: [break_glass, admin_activity, privileged]
        - min_distinct_sources: 2
        - severity_at_least: high

  - id: EXFILTRATION_WITH_IDENTITY_ANOMALY
    description: Data exfiltration signal paired with identity anomaly, indicating possible account compromise.
    confidence_score: 0.9
    draft_severity: critical
    min_events: 2
    conditions:
      all:
        - event_type_all: [data_exfiltration_alert, impossible_travel_admin_login]
        - same_linked_service: true
        - min_distinct_sources: 2
        - severity_at_least: high

  - id: STORAGE_CAPACITY_AND_BACKUP_FAILURE
    description: Storage saturation with backup failures and service degradation, increasing recovery risk.
    confidence_score: 0.79
    draft_severity: high
    min_events: 2
    conditions:
      all:
        - event_type_any: [disk_full_risk]
        - event_type_count_at_least:
            types: [backup_failure, service_error_rate_high]
            count: 1
        - same_linked_service: true

  - id: BATCH_PROCESSING_DEGRADATION
    description: Batch workload failing under queue pressure or upstream latency.
    confidence_score: 0.68
    draft_severity: medium
    min_events: 2
    conditions:
      all:
        - event_type_any: [batch_job_failure]
        - event_type_count_at_least:
            types: [queue_backlog_high, latency_spike, vendor_latency_degradation]
            count: 1
        - same_linked_service: true

  - id: REPEATED_WEAK_SIGNAL_BURST
    description: Three or more weak but related signals on the same service, warranting human review.
    confidence_score: 0.64
    draft_severity: medium
    min_events: 3
    conditions:
      all:
        - event_type_count_at_least:
            types: [service_error_rate_high, latency_spike, repeated_failed_privileged_access, vendor_degradation, incident_ticket_signal, queue_backlog_high]
            count: 3
        - same_linked_service: true

  - id: RISK_CONTEXT_AMPLIFIED_CYBER
    description: >
      A freshly ingested risk-context record co-occurring with an active security or identity
      anomaly on the same service. The risk context elevates the signal from a possible noise
      event to a reviewable candidate by providing structured evidence of known exposure.
    confidence_score: 0.72
    draft_severity: high
    min_events: 2
    conditions:
      all:
        # Must have a risk-context event in the group (freshly imported IRM or risk register entry)
        - source_type_any: [risk_context]
        # Must also have a security or identity signal on the same service
        - source_type_any: [security_event, identity_event]
        - same_linked_service: true
        - min_distinct_sources: 2

  - id: RISK_CONTEXT_AMPLIFIED_OPERATIONAL
    description: >
      A freshly ingested risk-context record co-occurring with operational degradation signals
      on the same service. Elevates a weak operational signal by pairing it with structured
      risk evidence, making a combined candidate incident worth human review.
    confidence_score: 0.61
    draft_severity: medium
    min_events: 2
    conditions:
      all:
        # Must have a risk-context event in the group
        - source_type_any: [risk_context]
        # Must also have a telemetry or vendor degradation signal on the same service
        - source_type_any: [telemetry_alert, vendor_event]
        - same_linked_service: true
        - min_distinct_sources: 2

  - id: PRIVILEGED_ACCESS_WITH_IMPOSSIBLE_TRAVEL
    description: >
      Failed or suspicious privileged access combined with an impossible-travel identity
      anomaly on the same service. High-confidence indicator of account compromise or
      credential theft — the travel signal proves the account is being used from two
      geographically incompatible locations simultaneously.
    confidence_score: 0.87
    draft_severity: critical
    min_events: 2
    conditions:
      all:
        - event_type_any: [failed_privileged_access, repeated_failed_privileged_access, suspicious_admin_session]
        - event_type_any: [impossible_travel_admin_login]
        - same_linked_service: true
        - min_distinct_sources: 2

  - id: VENDOR_OUTAGE_WITH_SERVICE_ERRORS
    description: >
      Vendor declared outage or critical degradation co-occurring with elevated service
      error rates on the same linked service. Confirms vendor-induced user-facing impact
      and distinguishes from internal faults — requiring vendor escalation rather than
      application-layer remediation.
    confidence_score: 0.83
    draft_severity: high
    min_events: 2
    conditions:
      all:
        - event_type_any: [vendor_outage, vendor_degradation]
        - event_type_any: [service_error_rate_high]
        - same_linked_service: true
        - vendor_present: true

  - id: MALWARE_ON_CRITICAL_SERVICE
    description: >
      Malware detection on any asset hosting a critical service. Single-signal rule
      with no minimum event count requirement beyond the malware alert itself. Regulatory
      obligation and data-at-rest risk justify immediate candidate creation regardless
      of corroborating signals.
    confidence_score: 0.88
    draft_severity: critical
    min_events: 1
    conditions:
      all:
        - event_type_any: [malware_detected]
        - critical_service: true
